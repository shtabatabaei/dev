<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>گردونه شانس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0f;
      font-family: 'Vazirmatn', sans-serif;
      color: #f5f5f5;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(220, 38, 38, 0.08), transparent),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(127, 29, 29, 0.12), transparent);
      pointer-events: none;
    }

    .app {
      --wheel-size: min(94vw, 460px);
      position: relative;
      width: 100%;
      min-height: 100vh;
      z-index: 1;
    }

    .wheel-stack {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: var(--wheel-size);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .wheel-area {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .controls {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      padding: 0 1.5rem;
    }

    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 32px solid #ef4444;
      filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.9))
              drop-shadow(0 0 24px rgba(239, 68, 68, 0.5));
      z-index: 10;
    }

    .wheel-outer {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(135deg, #fca5a5, #ef4444, #b91c1c, #ef4444);
      box-shadow:
        0 0 20px rgba(239, 68, 68, 0.6),
        0 0 60px rgba(239, 68, 68, 0.25),
        0 0 100px rgba(185, 28, 28, 0.15);
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      border: 3px solid #f87171;
      box-shadow:
        inset 0 0 30px rgba(0, 0, 0, 0.5),
        0 0 15px rgba(248, 113, 113, 0.4);
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      background: conic-gradient(
        #b83636 0deg 60deg,
        #3a0a0a 60deg 120deg,
        #b83636 120deg 180deg,
        #3a0a0a 180deg 240deg,
        #b83636 240deg 300deg,
        #3a0a0a 300deg 360deg
      );
    }

    .wheel-dividers {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .wheel-dividers line {
      vector-effect: non-scaling-stroke;
    }

    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(145deg, #991b1b, #450a0a);
      border: 3px solid #f87171;
      box-shadow:
        0 0 15px rgba(239, 68, 68, 0.5),
        inset 0 2px 8px rgba(255, 255, 255, 0.1);
      z-index: 5;
    }

    .segment-label {
      position: absolute;
      left: var(--left);
      top: var(--top);
      transform: translate(-50%, -50%);
      width: max-content;
      max-width: 7.5rem;
      direction: rtl;
      font-size: clamp(0.65rem, 2.8vw, 0.78rem);
      font-weight: 600;
      text-align: center;
      line-height: 1.35;
      color: #fecaca;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      z-index: 3;
    }

    .segment-label.pooch {
      color: #fca5a5;
      font-size: clamp(0.85rem, 3.2vw, 1rem);
      font-weight: 700;
      max-width: none;
    }

    .spin-btn {
      width: 100%;
      height: 55px;
      margin-top: 30px;
      padding: 0;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      background: #e03030;
      box-shadow: 0 0 20px rgba(255, 50, 50, 0.8);
      transition: box-shadow 0.15s, opacity 0.15s, filter 0.15s;
    }

    .spin-btn:hover:not(:disabled) {
      box-shadow: 0 0 28px rgba(255, 50, 50, 0.95);
      filter: brightness(1.08);
    }

    .spin-btn:active:not(:disabled) {
      filter: brightness(0.95);
    }

    .spin-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .result {
      min-height: 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fca5a5;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="wheel-stack">
      <div class="wheel-area">
        <div class="pointer" aria-hidden="true"></div>
        <div class="wheel-outer">
          <div class="wheel" id="wheel" role="img" aria-label="گردونه شانس">
            <svg class="wheel-dividers" viewBox="0 0 100 100" aria-hidden="true">
              <g stroke="rgba(255, 100, 100, 0.5)" stroke-width="1" stroke-linecap="round">
                <line x1="50" y1="50" x2="50" y2="0" vector-effect="non-scaling-stroke"/>
                <line x1="50" y1="50" x2="50" y2="0" transform="rotate(60 50 50)" vector-effect="non-scaling-stroke"/>
                <line x1="50" y1="50" x2="50" y2="0" transform="rotate(120 50 50)" vector-effect="non-scaling-stroke"/>
                <line x1="50" y1="50" x2="50" y2="0" transform="rotate(180 50 50)" vector-effect="non-scaling-stroke"/>
                <line x1="50" y1="50" x2="50" y2="0" transform="rotate(240 50 50)" vector-effect="non-scaling-stroke"/>
                <line x1="50" y1="50" x2="50" y2="0" transform="rotate(300 50 50)" vector-effect="non-scaling-stroke"/>
              </g>
            </svg>
            <div class="wheel-center"></div>
            <div class="segment-label" data-segment="0">۱ میلیون<br>تومان جایزه</div>
            <div class="segment-label pooch" data-segment="1">پوچ</div>
            <div class="segment-label" data-segment="2">۱۰ میلیون<br>تومان جایزه</div>
            <div class="segment-label pooch" data-segment="3">پوچ</div>
            <div class="segment-label" data-segment="4">۱۰۰ میلیون<br>تومان جایزه</div>
            <div class="segment-label pooch" data-segment="5">پوچ</div>
          </div>
        </div>
      </div>
      <button class="spin-btn" id="spinBtn" type="button">چرخوندن</button>
    </div>

    <div class="controls">
      <p class="result" id="result" aria-live="polite"></p>
    </div>
  </div>

  <script>
    const LABEL_RADIUS = 32;

    function positionSegmentLabels() {
      document.querySelectorAll('.segment-label').forEach((label) => {
        const segment = Number(label.dataset.segment);
        const angleDeg = segment * 60 + 30;
        const angleRad = (angleDeg * Math.PI) / 180;
        const left = 50 + LABEL_RADIUS * Math.sin(angleRad);
        const top = 50 - LABEL_RADIUS * Math.cos(angleRad);
        label.style.setProperty('--left', `${left}%`);
        label.style.setProperty('--top', `${top}%`);
      });
    }

    positionSegmentLabels();

    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const result = document.getElementById('result');

    const segments = [
      '۱ میلیون تومان جایزه',
      'پوچ',
      '۱۰ میلیون تومان جایزه',
      'پوچ',
      '۱۰۰ میلیون تومان جایزه',
      'پوچ'
    ];

    let currentRotation = 0;
    let spinning = false;

    spinBtn.addEventListener('click', () => {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      result.textContent = '';

      const segmentIndex = Math.floor(Math.random() * 6);
      const segmentAngle = 60;
      const extraSpins = 5 + Math.floor(Math.random() * 3);
      const targetAngle = 360 - (segmentIndex * segmentAngle + segmentAngle / 2);
      const totalRotation = currentRotation + extraSpins * 360 + targetAngle - (currentRotation % 360);

      currentRotation = totalRotation;
      wheel.style.transform = `rotate(${totalRotation}deg)`;

      wheel.addEventListener('transitionend', onSpinEnd, { once: true });

      function onSpinEnd() {
        spinning = false;
        spinBtn.disabled = false;
        const normalized = ((totalRotation % 360) + 360) % 360;
        const landedIndex = Math.floor(((360 - normalized + 30) % 360) / 60) % 6;
        const prize = segments[landedIndex];
        result.textContent = prize === 'پوچ' ? 'متأسفانه پوچ شد!' : `تبریک! ${prize} بردید!`;
      }
    });
  </script>
</body>
</html>
