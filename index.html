<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>گردونه شانس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 90% 70% at 50% 40%, #1c1428 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 80% 80%, #12182a 0%, transparent 50%),
        #060608;
      font-family: 'Vazirmatn', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .app {
      --wheel-size: min(82vw, 340px);
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .game-card {
      width: calc(var(--wheel-size) + 48px);
      max-width: 96vw;
      padding: 28px 24px 24px;
      border-radius: 22px;
      background: rgba(8, 8, 12, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow:
        0 0 50px rgba(120, 40, 180, 0.12),
        0 0 80px rgba(40, 60, 160, 0.08),
        0 24px 48px rgba(0, 0, 0, 0.5);
    }

    .wheel-stack {
      width: var(--wheel-size);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .wheel-area {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pointer {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 34px;
      height: 30px;
      z-index: 10;
      filter: drop-shadow(0 0 6px rgba(255, 50, 50, 0.9))
              drop-shadow(0 0 14px rgba(255, 30, 30, 0.7));
    }

    .wheel-outer {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      padding: 14px;
      position: relative;
      background: linear-gradient(
        165deg,
        #45454c 0%,
        #2e2e34 18%,
        #1a1a1f 50%,
        #121216 78%,
        #2a2a32 100%
      );
      box-shadow:
        inset 0 2px 3px rgba(255, 255, 255, 0.14),
        inset 0 -4px 8px rgba(0, 0, 0, 0.75),
        0 0 28px rgba(255, 40, 40, 0.35),
        0 0 60px rgba(255, 30, 30, 0.12);
    }

    .wheel-outer::before,
    .wheel-outer::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
    }

    .wheel-outer::before {
      inset: 9px;
      border: 1.5px solid rgba(255, 55, 55, 0.85);
      box-shadow:
        0 0 10px rgba(255, 50, 50, 0.75),
        inset 0 0 10px rgba(255, 40, 40, 0.25);
    }

    .wheel-outer::after {
      inset: 3px;
      border: 1px solid rgba(255, 70, 70, 0.55);
      box-shadow: 0 0 8px rgba(255, 50, 50, 0.45);
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      z-index: 1;
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.65);
    }

    .wheel-spinner,
    .wheel-labels {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }

    .wheel-spinner {
      background: conic-gradient(
        #2c2c30 0deg 60deg,
        #1f1f23 60deg 120deg,
        #2c2c30 120deg 180deg,
        #1f1f23 180deg 240deg,
        #2c2c30 240deg 300deg,
        #1f1f23 300deg 360deg
      );
    }

    .wheel-spinner::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(ellipse 80% 50% at 30% 20%, rgba(255, 255, 255, 0.07) 0%, transparent 55%),
        radial-gradient(ellipse 70% 45% at 70% 75%, rgba(0, 0, 0, 0.35) 0%, transparent 50%);
      pointer-events: none;
    }

    .wheel-labels {
      --wheel-rotation: 0deg;
      z-index: 3;
      pointer-events: none;
    }

    .wheel-dividers {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      filter: drop-shadow(0 0 3px rgba(255, 40, 40, 0.8));
    }

    .wheel-dividers line {
      vector-effect: non-scaling-stroke;
    }

    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(155deg, #52525a 0%, #35353c 35%, #222228 70%, #18181c 100%);
      box-shadow:
        0 4px 10px rgba(0, 0, 0, 0.7),
        inset 0 2px 3px rgba(255, 255, 255, 0.18),
        inset 0 -3px 6px rgba(0, 0, 0, 0.5);
      z-index: 5;
    }

    .segment-label {
      position: absolute;
      left: var(--left);
      top: var(--top);
      transform: translate(-50%, -50%) rotate(calc(-1 * var(--wheel-rotation)));
      width: max-content;
      max-width: 6.8rem;
      direction: rtl;
      text-align: center;
      color: #fff;
      line-height: 1.25;
      pointer-events: none;
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }

    .segment-label .amount {
      display: block;
      font-size: clamp(0.95rem, 4.2vw, 1.15rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
    }

    .segment-label .sub {
      display: block;
      font-size: clamp(0.55rem, 2.4vw, 0.68rem);
      font-weight: 600;
      opacity: 0.92;
      margin-top: 2px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.85);
    }

    .segment-label.pooch {
      font-size: clamp(0.9rem, 3.8vw, 1.05rem);
      font-weight: 800;
      max-width: none;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
    }

    .result {
      margin-top: 18px;
      min-height: 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffb4b4;
      text-align: center;
      line-height: 1.5;
    }

    .spin-btn {
      width: 100%;
      height: 46px;
      margin-top: 12px;
      padding: 0;
      border: none;
      border-radius: 23px;
      cursor: pointer;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #f03838 0%, #d82828 50%, #c02020 100%);
      box-shadow:
        0 0 22px rgba(255, 50, 50, 0.85),
        0 0 44px rgba(255, 30, 30, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transition: box-shadow 0.15s, opacity 0.15s, filter 0.15s;
    }

    .spin-btn:hover:not(:disabled) {
      box-shadow:
        0 0 30px rgba(255, 55, 55, 0.95),
        0 0 55px rgba(255, 35, 35, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
      filter: brightness(1.06);
    }

    .spin-btn:active:not(:disabled) {
      filter: brightness(0.94);
    }

    .spin-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="game-card">
      <div class="wheel-stack">
        <div class="wheel-area">
          <svg class="pointer" viewBox="0 0 34 30" aria-hidden="true">
            <polygon
              points="17,3 31,27 3,27"
              fill="#0c0c10"
              stroke="#ff3b3b"
              stroke-width="2"
              stroke-linejoin="round"
            />
          </svg>
          <div class="wheel-outer">
            <div class="wheel" role="img" aria-label="گردونه شانس">
              <div class="wheel-spinner" id="wheelSpinner">
                <svg class="wheel-dividers" viewBox="0 0 100 100" aria-hidden="true">
                  <g stroke="rgba(255, 55, 55, 0.9)" stroke-width="1" stroke-linecap="round">
                    <line x1="50" y1="50" x2="50" y2="0" vector-effect="non-scaling-stroke"/>
                    <line x1="50" y1="50" x2="50" y2="0" transform="rotate(60 50 50)" vector-effect="non-scaling-stroke"/>
                    <line x1="50" y1="50" x2="50" y2="0" transform="rotate(120 50 50)" vector-effect="non-scaling-stroke"/>
                    <line x1="50" y1="50" x2="50" y2="0" transform="rotate(180 50 50)" vector-effect="non-scaling-stroke"/>
                    <line x1="50" y1="50" x2="50" y2="0" transform="rotate(240 50 50)" vector-effect="non-scaling-stroke"/>
                    <line x1="50" y1="50" x2="50" y2="0" transform="rotate(300 50 50)" vector-effect="non-scaling-stroke"/>
                  </g>
                </svg>
                <div class="wheel-center"></div>
              </div>
              <div class="wheel-labels" id="wheelLabels">
                <div class="segment-label prize" data-segment="0">
                  <span class="amount">۱ میلیون</span>
                  <span class="sub">تومان جایزه</span>
                </div>
                <div class="segment-label pooch" data-segment="1">پوچ</div>
                <div class="segment-label prize" data-segment="2">
                  <span class="amount">۱۰ میلیون</span>
                  <span class="sub">تومان جایزه</span>
                </div>
                <div class="segment-label pooch" data-segment="3">پوچ</div>
                <div class="segment-label prize" data-segment="4">
                  <span class="amount">۱۰۰ میلیون</span>
                  <span class="sub">تومان جایزه</span>
                </div>
                <div class="segment-label pooch" data-segment="5">پوچ</div>
              </div>
            </div>
          </div>
        </div>
        <p class="result" id="result" aria-live="polite"></p>
        <button class="spin-btn" id="spinBtn" type="button">چرخوندن</button>
      </div>
    </div>
  </div>

  <script>
    const LABEL_RADIUS = 30;

    function positionSegmentLabels() {
      document.querySelectorAll('.segment-label').forEach((label) => {
        const segment = Number(label.dataset.segment);
        const angleDeg = segment * 60 + 30;
        const angleRad = (angleDeg * Math.PI) / 180;
        const left = 50 + LABEL_RADIUS * Math.sin(angleRad);
        const top = 50 - LABEL_RADIUS * Math.cos(angleRad);
        label.style.setProperty('--left', `${left}%`);
        label.style.setProperty('--top', `${top}%`);
      });
    }

    positionSegmentLabels();

    const wheelSpinner = document.getElementById('wheelSpinner');
    const wheelLabels = document.getElementById('wheelLabels');
    const spinBtn = document.getElementById('spinBtn');
    const result = document.getElementById('result');

    function setWheelRotation(degrees) {
      const rotation = `${degrees}deg`;
      wheelSpinner.style.transform = `rotate(${rotation})`;
      wheelLabels.style.transform = `rotate(${rotation})`;
      wheelLabels.style.setProperty('--wheel-rotation', rotation);
    }

    const segments = [
      '۱ میلیون تومان جایزه',
      'پوچ',
      '۱۰ میلیون تومان جایزه',
      'پوچ',
      '۱۰۰ میلیون تومان جایزه',
      'پوچ'
    ];

    let currentRotation = 0;
    let spinning = false;

    spinBtn.addEventListener('click', () => {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      result.textContent = '';

      const segmentIndex = Math.floor(Math.random() * 6);
      const segmentAngle = 60;
      const extraSpins = 5 + Math.floor(Math.random() * 3);
      const targetAngle = 360 - (segmentIndex * segmentAngle + segmentAngle / 2);
      const totalRotation = currentRotation + extraSpins * 360 + targetAngle - (currentRotation % 360);

      currentRotation = totalRotation;
      setWheelRotation(totalRotation);

      wheelSpinner.addEventListener('transitionend', onSpinEnd, { once: true });

      function onSpinEnd() {
        spinning = false;
        spinBtn.disabled = false;
        const normalized = ((totalRotation % 360) + 360) % 360;
        const landedIndex = Math.floor(((360 - normalized + 30) % 360) / 60) % 6;
        const prize = segments[landedIndex];
        result.textContent = prize === 'پوچ' ? 'متأسفانه پوچ شد!' : `تبریک! ${prize} بردید!`;
      }
    });
  </script>
</body>
</html>
